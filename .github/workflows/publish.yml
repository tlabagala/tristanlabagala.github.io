on:
  push:
    branches: [main]
  workflow_dispatch:

name: Publish site

# This workflow installs ONLY Quarto. Because execute: freeze: auto caches
# executed output in _freeze/ (which is committed), the runner never needs R,
# Python, or any package. It just assembles pre-computed output into HTML.

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render and publish to gh-pages
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
